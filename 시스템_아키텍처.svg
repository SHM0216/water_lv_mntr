<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 650" width="680" height="650" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">빗물펌프장 모바일 API 시스템 아키텍처</title>
  <desc id="arch-desc">SCADA 폐쇄망에서 DMZ, 백엔드, 모바일 앱까지 이어지는 단방향 데이터 흐름 다이어그램</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t-box { font: 500 14px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #042C53; }
      .t-sub { font: 400 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #185FA5; }
      .t-box-a { font: 500 14px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #633806; }
      .t-sub-a { font: 400 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #854F0B; }
      .t-box-t { font: 500 14px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #04342C; }
      .t-sub-t { font: 400 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #0F6E56; }
      .t-box-p { font: 500 14px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #26215C; }
      .t-tag-b { font: 500 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #042C53; }
      .t-tag-a { font: 500 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #633806; }
      .t-tag-t { font: 500 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #04342C; }
      .t-tag-p { font: 500 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #26215C; }
      .t-arrow { font: 400 12px 'Pretendard', 'Malgun Gothic', sans-serif; fill: #5F5E5A; }
    </style>
  </defs>

  <rect width="680" height="650" fill="#FFFFFF"/>

  <!-- Zone 1: OT Network -->
  <rect x="40" y="40" width="600" height="120" rx="14" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 4"/>
  <rect x="56" y="52" width="120" height="22" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t-tag-b" x="116" y="66" text-anchor="middle" dominant-baseline="central">1. 폐쇄 OT망</text>
  <rect x="70" y="90" width="230" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t-box" x="185" y="110" text-anchor="middle" dominant-baseline="central">빗물펌프장 22개소</text>
  <text class="t-sub" x="185" y="130" text-anchor="middle" dominant-baseline="central">PLC · 내수위/외수위 센서</text>
  <line x1="300" y1="118" x2="368" y2="118" stroke="#444" stroke-width="0.8" marker-end="url(#arrow)"/>
  <rect x="370" y="90" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="t-box" x="490" y="110" text-anchor="middle" dominant-baseline="central">SCADA 서버</text>
  <text class="t-sub" x="490" y="130" text-anchor="middle" dominant-baseline="central">OPC UA · Modbus 수집</text>

  <line x1="340" y1="160" x2="340" y2="208" stroke="#444" stroke-width="0.8" marker-end="url(#arrow)"/>
  <text class="t-arrow" x="350" y="188">단방향 (읽기 전용)</text>

  <!-- Zone 2: DMZ -->
  <rect x="40" y="210" width="600" height="100" rx="14" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 4"/>
  <rect x="56" y="222" width="150" height="22" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="t-tag-a" x="131" y="236" text-anchor="middle" dominant-baseline="central">2. DMZ · 경계구간</text>
  <rect x="70" y="255" width="260" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="t-box-a" x="200" y="272" text-anchor="middle" dominant-baseline="central">단방향 게이트웨이</text>
  <text class="t-sub-a" x="200" y="290" text-anchor="middle" dominant-baseline="central">Data Diode · 읽기만 허용</text>
  <rect x="350" y="255" width="260" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="t-box-a" x="480" y="272" text-anchor="middle" dominant-baseline="central">수집 에이전트</text>
  <text class="t-sub-a" x="480" y="290" text-anchor="middle" dominant-baseline="central">30초 주기 · MQTT/HTTPS</text>

  <line x1="340" y1="310" x2="340" y2="358" stroke="#444" stroke-width="0.8" marker-end="url(#arrow)"/>
  <text class="t-arrow" x="350" y="338">TLS 1.3 + 인증서</text>

  <!-- Zone 3: Backend -->
  <rect x="40" y="360" width="600" height="140" rx="14" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 4"/>
  <rect x="56" y="372" width="210" height="22" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t-tag-t" x="161" y="386" text-anchor="middle" dominant-baseline="central">3. 백엔드 서버 (클라우드)</text>
  <rect x="60" y="408" width="180" height="78" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t-box-t" x="150" y="430" text-anchor="middle" dominant-baseline="central">FastAPI</text>
  <text class="t-sub-t" x="150" y="450" text-anchor="middle" dominant-baseline="central">REST · WebSocket</text>
  <text class="t-sub-t" x="150" y="468" text-anchor="middle" dominant-baseline="central">인증 · API 게이트</text>
  <rect x="250" y="408" width="180" height="78" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t-box-t" x="340" y="430" text-anchor="middle" dominant-baseline="central">TimescaleDB</text>
  <text class="t-sub-t" x="340" y="450" text-anchor="middle" dominant-baseline="central">시계열 저장</text>
  <text class="t-sub-t" x="340" y="468" text-anchor="middle" dominant-baseline="central">22개소 × 30초</text>
  <rect x="440" y="408" width="180" height="78" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="t-box-t" x="530" y="430" text-anchor="middle" dominant-baseline="central">알람 엔진</text>
  <text class="t-sub-t" x="530" y="450" text-anchor="middle" dominant-baseline="central">4단계 임계값 판정</text>
  <text class="t-sub-t" x="530" y="468" text-anchor="middle" dominant-baseline="central">FCM · APNs 발송</text>

  <line x1="340" y1="500" x2="340" y2="548" stroke="#444" stroke-width="0.8" marker-end="url(#arrow)"/>
  <text class="t-arrow" x="350" y="528">WSS · Push 알림</text>

  <!-- Zone 4: Mobile -->
  <rect x="40" y="550" width="600" height="80" rx="14" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 4"/>
  <rect x="56" y="562" width="120" height="22" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t-tag-p" x="116" y="576" text-anchor="middle" dominant-baseline="central">4. 모바일 앱</text>
  <rect x="70" y="594" width="540" height="30" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t-box-p" x="340" y="609" text-anchor="middle" dominant-baseline="central">React Native · iOS / Android · 실시간 수위 + 4단계 경보</text>
</svg>
